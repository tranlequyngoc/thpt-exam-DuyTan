<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
    <title>X-Exam - Thong ke</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
    *{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',sans-serif;background:#f0f2f5}
    .nav{background:linear-gradient(135deg,#302b63,#24243e);color:#fff;padding:12px 25px;display:flex;justify-content:space-between;align-items:center}
    .nav a{color:#fff;text-decoration:none;padding:6px 14px;border-radius:20px;font-size:13px}.nav a:hover{background:rgba(255,255,255,.2)}
    .container{max-width:1000px;margin:20px auto;padding:0 20px}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
    .stat{background:#fff;border-radius:12px;padding:20px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}
    .stat .num{font-size:32px;font-weight:800;color:#302b63}.stat .label{color:#888;margin-top:4px;font-size:13px}
    .card{background:#fff;border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:0 4px 15px rgba(0,0,0,.08)}
    .card h2{color:#302b63;margin-bottom:16px;font-size:18px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:11px 12px;text-align:left;border-bottom:1px solid #eee;font-size:13px}
    th{background:#f8f7ff;color:#302b63;font-weight:700}
    tr:hover{background:#fafafa}
    .bar{height:16px;border-radius:8px;background:#e8e8e8;overflow:hidden;margin-top:4px}
    .bar-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,#302b63,#667eea);transition:width .8s}
    @media(max-width:600px){.grid2{grid-template-columns:1fr}}
    </style></head><body>
    <div class="nav"><a href="/dashboard">X-EXAM</a><h3>Thong ke hoc tap</h3><a href="/dashboard">Trang chu</a></div>
    <div class="container">
    <div class="stats" id="overview"></div>
    <div class="grid2">
    <div class="card"><h2>Diem theo mon</h2><canvas id="subjectChart" height="220"></canvas></div>
    <div class="card"><h2>Phan bo diem</h2><canvas id="distChart" height="220"></canvas></div>
    </div>
    <div class="card"><h2>Lich su lam bai</h2>
    <table><thead><tr><th>De thi</th><th>Mon</th><th>Diem</th><th>Dung</th><th>Sai</th><th>TG</th><th>Ngay</th></tr></thead>
    <tbody id="history"></tbody></table>
    </div>
    </div>
    <script>
    let subChart=null,distChart=null;
    async function load(){
    const r=await fetch('/api/stats');const d=await r.json();
    document.getElementById('overview').innerHTML=`
    <div class="stat"><div class="num">${d.total_exams}</div><div class="label">De da lam</div></div>
    <div class="stat"><div class="num">${d.total_submissions}</div><div class="label">Lan nop</div></div>
    <div class="stat"><div class="num">${d.avg_score}</div><div class="label">Diem TB</div></div>
    <div class="stat"><div class="num">${d.recent.filter(r=>r.score>=5).length}</div><div class="label">Lan dat (>=5)</div></div>`;
    // Subject chart
    if(d.by_subject.length){
    const ctx1=document.getElementById('subjectChart').getContext('2d');
    if(subChart)subChart.destroy();
    subChart=new Chart(ctx1,{type:'radar',data:{
    labels:d.by_subject.map(s=>s.subject),
    datasets:[{label:'Diem TB',data:d.by_subject.map(s=>s.avg_score),
    fill:true,backgroundColor:'rgba(102,126,234,.2)',borderColor:'#667eea',pointBackgroundColor:'#667eea'}]
    },options:{responsive:true,scales:{r:{beginAtZero:true,max:10}}}});
    }
    // Score distribution
    const buckets=[0,0,0,0,0];
    d.recent.forEach(r=>{const p=r.score/r.total_score*10;buckets[Math.min(Math.floor(p/2),4)]++;});
    const ctx2=document.getElementById('distChart').getContext('2d');
    if(distChart)distChart.destroy();
    distChart=new Chart(ctx2,{type:'doughnut',data:{
    labels:['0-2','2-4','4-6','6-8','8-10'],
    datasets:[{data:buckets,backgroundColor:['#e74c3c','#e67e22','#f1c40f','#2ecc71','#27ae60'],borderWidth:2}]
    },options:{responsive:true,plugins:{legend:{position:'bottom'}}}});
    // History
    document.getElementById('history').innerHTML=d.recent.map(r=>`
    <tr>
    <td><a href="/result/${r.id}" style="color:#302b63;font-weight:600">${r.title}</a></td>
    <td><span style="background:#ede7f6;color:#4527a0;padding:2px 8px;border-radius:10px;font-size:11px">${r.subject}</span></td>
    <td><b style="color:${r.score>=r.total_score*0.8?'#27ae60':r.score>=r.total_score*0.5?'#f39c12':'#e74c3c'}">${r.score}/${r.total_score}</b></td>
    <td style="color:#27ae60">${r.total_correct}</td>
    <td style="color:#e74c3c">${r.total_wrong}</td>
    <td style="color:#888">${Math.floor(r.time_spent/60)}p</td>
    <td style="font-size:12px;color:#888">${(r.submitted_at||'').slice(0,16)}</td>
    </tr>`).join('')||'<tr><td colspan="7" style="text-align:center;color:#888">Chua co du lieu</td></tr>';
    }
    load();
    </script><script src="/static/js/mascot.js"></script>
    </body></html>
