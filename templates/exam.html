<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta http-equiv="X-UA-Compatible" content="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
    <title>X-Exam - Làm bài</title>
    <script>window.MathJax={tex:{inlineMath:[['$','$'],['\\(','\\)']],displayMath:[['$$','$$'],['\\[','\\]']],processEscapes:true},options:{skipHtmlTags:['script','noscript','style','textarea']},startup:{typeset:false}};</script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.min.js" async></script>
    <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',sans-serif;background:#f0f2f5}
    .nav{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:12px 25px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
    .nav a{color:#fff;text-decoration:none}
    .timer{font-size:20px;font-weight:700;background:rgba(255,255,255,0.2);padding:8px 16px;border-radius:8px}
    .timer.warning{background:#e74c3c;animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
    .anticheat-warning{position:fixed;top:0;left:0;right:0;z-index:9999;background:#e74c3c;color:#fff;padding:14px;text-align:center;font-size:15px;font-weight:700;display:none;animation:pulse 1s infinite}
    .violation-badge{background:rgba(231,76,60,.3);padding:4px 10px;border-radius:8px;font-size:13px;margin-left:10px}
    .container{max-width:900px;margin:20px auto;padding:0 20px 180px}
    .q-card{background:#fff;border-radius:14px;padding:22px;margin-bottom:14px;box-shadow:0 3px 12px rgba(0,0,0,0.06);transition:.3s}
    .q-card:hover{box-shadow:0 5px 20px rgba(0,0,0,0.1)}
    .q-num{color:#764ba2;font-weight:700;font-size:15px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
    .q-type{font-size:11px;padding:3px 10px;border-radius:12px;font-weight:600}
    .type-mc{background:#e3f2fd;color:#1565c0}
    .type-tf{background:#fff3e0;color:#e65100}
    .type-essay{background:#fce4ec;color:#c62828}
    .q-content{font-size:14px;margin-bottom:14px;line-height:1.7;white-space:pre-wrap}
    
    /* MC options */
    .mc-options label{display:block;padding:12px 16px;margin:5px 0;border:2px solid #eee;border-radius:10px;cursor:pointer;transition:.3s;font-size:14px}
    .mc-options label:hover{border-color:#764ba2;background:#f8f5ff}
    .mc-options input:checked+span{color:#764ba2;font-weight:700}
    .mc-options label:has(input:checked){border-color:#764ba2;background:#f0eaff}
    .mc-options input{margin-right:10px}
    
    /* TF options */
    .tf-grid{display:grid;gap:8px}
    .tf-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#fafafa;border-radius:10px;border:1px solid #eee}
    .tf-label{flex:1;font-size:13px;line-height:1.5}
    .tf-btns{display:flex;gap:6px;flex-shrink:0}
    .tf-btn{padding:6px 14px;border:2px solid #ddd;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;transition:.3s;background:#fff}
    .tf-btn:hover{border-color:#764ba2}
    .tf-btn.selected-d{background:#27ae60;color:#fff;border-color:#27ae60}
    .tf-btn.selected-s{background:#e74c3c;color:#fff;border-color:#e74c3c}
    
    /* Essay */
    .essay-input{width:100%;padding:14px;border:2px solid #ddd;border-radius:10px;font-size:14px;min-height:100px;resize:vertical;font-family:inherit;line-height:1.6}
    .essay-input:focus{border-color:#764ba2;outline:none}
    .img-upload-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:linear-gradient(135deg,#27ae60,#2ecc71);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;margin-top:8px;transition:.3s}
    .img-upload-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(39,174,96,.3)}
    .img-preview{margin-top:8px;border-radius:10px;overflow:hidden;border:2px solid #ddd;display:none}
    .img-preview img{width:100%;max-height:300px;object-fit:contain;background:#f5f5f5}
    
    /* Nav dots */
    .q-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:10px 15px 12px;box-shadow:0 -3px 15px rgba(0,0,0,0.1);z-index:99;display:flex;flex-direction:column;align-items:center;gap:8px}
    .q-dots-wrap{display:flex;justify-content:center;gap:5px;flex-wrap:wrap;width:100%;max-height:80px;overflow-y:auto}
    .q-dot{width:34px;height:34px;border-radius:50%;border:2px solid #ddd;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;font-weight:600;transition:.3s;flex-shrink:0}
    .q-dot:hover{border-color:#764ba2}
    .q-dot.answered{background:#764ba2;color:#fff;border-color:#764ba2}
    .submit-wrap{width:100%;text-align:center;padding:4px 0 0}
    .btn{padding:12px 50px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:.3s;width:90%;max-width:360px;display:block;margin:0 auto}
    .btn:hover{transform:translateY(-2px);box-shadow:0 5px 20px rgba(102,126,234,0.4)}
    </style></head><body>
    <div class="anticheat-warning" id="acWarning">⚠️ CANH BAO: Ban vua chuyen ra khoi bai thi! <span id="acCount"></span></div>
    <div class="nav">
    <a href="/dashboard">&#x1F680; X-EXAM</a>
    <h3 id="examTitle"></h3>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="timer" id="timer">--:--</div>
      <span class="violation-badge" id="violationBadge" style="display:none">&#x26A0; <span id="vCount">0</span> vi pham</span>
    </div>
    </div>
    <div class="container" id="qContainer"></div>
    <div class="q-nav">
        <div class="q-dots-wrap" id="qNav"></div>
        <div class="submit-wrap">
            <button class="btn" onclick="submitExam()">&#x1F4E8; NỘP BÀI</button>
        </div>
    </div>
    <script src="/static/js/mascot.js"></script>
    <script>
    const EID={{exam_id}};
    let questions=[],answers={},essayImages={},timeLeft=0,timerInterval,startTime=Date.now();
    let violations=0; const MAX_VIOLATIONS=5;

    // ── ANTI-CHEAT ──
    function recordViolation(reason){
        violations++;
        document.getElementById('vCount').textContent=violations;
        document.getElementById('violationBadge').style.display='inline';
        const warn=document.getElementById('acWarning');
        document.getElementById('acCount').textContent=`(${violations}/${MAX_VIOLATIONS} lan - Con ${MAX_VIOLATIONS-violations} lan nua se tu dong nop bai)`;
        warn.style.display='block';
        setTimeout(()=>warn.style.display='none',4000);
        if(violations>=MAX_VIOLATIONS){
            warn.style.display='block';
            warn.textContent='BAN DA VI PHAM QUA NHIEU LAN! BAI THI DANG DUOC NOP TU DONG...';
            setTimeout(()=>submitExam(true),2000);
        }
    }
    // Tab switch detection
    document.addEventListener('visibilitychange',()=>{
        if(document.hidden&&timeLeft>0)recordViolation('tab_switch');
    });
    // Window blur
    let blurTimer;
    window.addEventListener('blur',()=>{
        blurTimer=setTimeout(()=>{if(timeLeft>0)recordViolation('window_blur')},1500);
    });
    window.addEventListener('focus',()=>clearTimeout(blurTimer));
    // Disable right-click & copy
    document.addEventListener('contextmenu',e=>e.preventDefault());
    document.addEventListener('copy',e=>{e.preventDefault();});
    // Disable dev tools shortcuts
    document.addEventListener('keydown',e=>{
        if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&['I','J','C'].includes(e.key))||(e.ctrlKey&&e.key==='u'))
            e.preventDefault();
    });
    
    async function load(){
        const r=await fetch('/api/exam/'+EID);const d=await r.json();
        if(d.error){alert(d.error);location.href='/dashboard';return;}
        document.getElementById('examTitle').textContent=d.exam.title;
        questions=d.questions;timeLeft=d.exam.time_limit*60;
        render();startTimer();
        // Render MathJax after questions load
        if(window.MathJax)window.MathJax.typesetPromise&&window.MathJax.typesetPromise();
    }
    
    function render(){
        const c=document.getElementById('qContainer');
        c.innerHTML=questions.map((q,i)=>{
            const typeLabel=q.type==='true_false'?'Đúng/Sai':(q.type==='essay'?'Tự luận':'Trắc nghiệm');
            const typeCls=q.type==='true_false'?'type-tf':(q.type==='essay'?'type-essay':'type-mc');
            
            let optionsHtml='';
            
            if(q.type==='multiple_choice'){
                optionsHtml='<div class="mc-options">';
                ['A','B','C','D'].forEach(o=>{
                    const val=q['option_'+o.toLowerCase()];
                    if(!val)return;
                    optionsHtml+=`<label><input type="radio" name="q${q.id}" value="${o}" onchange="setAns(${q.id},'${o}')"><span>${o}. ${val}</span></label>`;
                });
                optionsHtml+='</div>';
            }
            else if(q.type==='true_false'){
                // Split content into sub-questions a), b), c), d)
                const lines=q.content.split('\n').filter(l=>l.trim());
                const mainQ=[];const subs=[];
                lines.forEach(l=>{
                    const m=l.trim().match(/^([abcd])\)\s*(.+)/i);
                    if(m)subs.push({letter:m[1].toLowerCase(),text:m[2]});
                    else mainQ.push(l);
                });
                
                optionsHtml='<div class="tf-grid">';
                if(subs.length>0){
                    subs.forEach((s,si)=>{
                        const checked=answers[q.id]?answers[q.id][si]:'';
                        optionsHtml+=`<div class="tf-row">
                            <div class="tf-label"><b>${s.letter})</b> ${s.text}</div>
                            <div class="tf-btns">
                                <div class="tf-btn ${checked==='D'?'selected-d':''}" onclick="setTF(${q.id},${si},'D',this)">Đúng</div>
                                <div class="tf-btn ${checked==='S'?'selected-s':''}" onclick="setTF(${q.id},${si},'S',this)">Sai</div>
                            </div>
                        </div>`;
                    });
                }else{
                    // No sub-questions detected, show 4 generic
                    for(let si=0;si<4;si++){
                        const labels=['a','b','c','d'];
                        const checked=answers[q.id]?answers[q.id][si]:'';
                        optionsHtml+=`<div class="tf-row">
                            <div class="tf-label"><b>${labels[si]})</b> Ý ${labels[si]}</div>
                            <div class="tf-btns">
                                <div class="tf-btn ${checked==='D'?'selected-d':''}" onclick="setTF(${q.id},${si},'D',this)">Đúng</div>
                                <div class="tf-btn ${checked==='S'?'selected-s':''}" onclick="setTF(${q.id},${si},'S',this)">Sai</div>
                            </div>
                        </div>`;
                    }
                }
                optionsHtml+='</div>';
                // Override content to show only main question part
                if(subs.length>0)q._mainContent=mainQ.join('\n');
            }
            else if(q.type==='essay'){
                const saved=answers[q.id]||'';
                const imgUrl=essayImages[q.id]||'';
                optionsHtml=`<textarea class="essay-input" id="essay_${q.id}" placeholder="Nhap cau tra loi hoac chup anh bai lam..." onchange="setAns(${q.id},this.value)" oninput="setAns(${q.id},this.value)">${saved.replace(/<img[^>]*>/g,'')}</textarea>
                <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
                <button class="img-upload-btn" onclick="document.getElementById('imgInput_${q.id}').click()">&#x1F4F7; Chup anh / Upload anh bai lam</button>
                <input type="file" id="imgInput_${q.id}" accept="image/*" capture="environment" style="display:none" onchange="uploadEssayImg(${q.id},this)">
                <span id="imgStatus_${q.id}" style="font-size:12px;color:#888"></span>
                </div>
                <div class="img-preview" id="imgPrev_${q.id}" ${imgUrl?'style="display:block"':''}>${imgUrl?'<img src="'+imgUrl+'">':''}</div>`;
            }
            
            const displayContent=q._mainContent||q.content;
            
            return`<div class="q-card" id="q${q.id}">
                <div class="q-num">
                    <span>Câu ${q.question_number} <small>(${q.score} điểm)</small></span>
                    <span class="q-type ${typeCls}">${typeLabel}</span>
                </div>
                <div class="q-content">${displayContent}</div>
                ${optionsHtml}
            </div>`;
        }).join('');
        
        // Nav dots
        document.getElementById('qNav').innerHTML=questions.map(q=>
            `<div class="q-dot ${answers[q.id]?'answered':''}" id="dot${q.id}" onclick="document.getElementById('q${q.id}').scrollIntoView({behavior:'smooth'})">${q.question_number}</div>`
        ).join('');
        
        // Render MathJax after content is updated
        if(window.MathJax && window.MathJax.typesetPromise){
            MathJax.typesetPromise().catch(e=>console.log('MathJax error:',e));
        }
    }
    
    function setAns(qid,val){
        answers[qid]=val;
        document.getElementById('dot'+qid).classList.add('answered');
    }
    
    function setTF(qid,subIdx,val,el){
        if(!answers[qid])answers[qid]=['','','',''];
        if(typeof answers[qid]==='string'){
            const arr=answers[qid].split('');
            while(arr.length<4)arr.push('');
            answers[qid]=arr;
        }
        answers[qid][subIdx]=val;
        
        // Update UI
        const row=el.parentElement;
        row.querySelectorAll('.tf-btn').forEach(b=>{b.className='tf-btn'});
        el.className='tf-btn '+(val==='D'?'selected-d':'selected-s');
        
        // Check if all 4 answered
        const allDone=answers[qid].every(v=>v);
        if(allDone)document.getElementById('dot'+qid).classList.add('answered');
    }
    
    async function uploadEssayImg(qid,input){
        const file=input.files[0];if(!file)return;
        const status=document.getElementById('imgStatus_'+qid);
        status.textContent='Dang upload...';status.style.color='#f39c12';
        const fd=new FormData();fd.append('image',file);
        try{
            const r=await fetch('/api/upload-answer-image',{method:'POST',body:fd});
            const d=await r.json();
            if(d.success){
                essayImages[qid]=d.url;
                const prev=document.getElementById('imgPrev_'+qid);
                prev.style.display='block';prev.innerHTML='<img src="'+d.url+'">';
                const txt=(answers[qid]||'').replace(/<img[^>]*>/g,'');
                setAns(qid, txt+'<img src="'+d.url+'">');
                status.textContent='Upload thanh cong!';status.style.color='#27ae60';
            }else{status.textContent='Loi: '+d.error;status.style.color='#e74c3c';}
        }catch(e){status.textContent='Loi upload!';status.style.color='#e74c3c';}
    }

    function startTimer(){
        const el=document.getElementById('timer');
        timerInterval=setInterval(()=>{
            timeLeft--;
            if(timeLeft<=0){clearInterval(timerInterval);submitExam();return}
            const m=Math.floor(timeLeft/60);const s=timeLeft%60;
            el.textContent=m.toString().padStart(2,'0')+':'+s.toString().padStart(2,'0');
            if(timeLeft<300)el.classList.add('warning');
        },1000);
    }
    
    async function submitExam(auto=false){
        if(!auto&&!confirm('Bạn có chắc muốn nộp bài?'))return;
        clearInterval(timerInterval);
        const spent=Math.floor((Date.now()-startTime)/1000);
        
        // Convert TF arrays to strings
        const finalAnswers={};
        for(const[k,v]of Object.entries(answers)){
            if(Array.isArray(v))finalAnswers[k]=v.join('');
            else finalAnswers[k]=v;
        }
        
        const r=await fetch('/api/submit',{method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({exam_id:EID,answers:finalAnswers,time_spent:spent,violations})});
        const d=await r.json();
        if(d.success)location.href='/result/'+d.submission_id;
        else alert('Lỗi: '+(d.error||'Unknown'));
    }
    
    load();
    </script></body></html>
